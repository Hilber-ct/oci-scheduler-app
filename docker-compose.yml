services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 634145
      MYSQL_DATABASE: cloud_db
      MYSQL_USER: hilber
      MYSQL_PASSWORD: 634145
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  dbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: dbeaver_container
    restart: always
    ports:
      - "8978:8978"
    volumes:
      - dbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      - mysql-db

volumes:
  mysql_data:
  dbeaver_data: